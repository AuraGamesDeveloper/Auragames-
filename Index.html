<!DOCTYPE html>
<html>
<head>
<title>Tap Green – Avoid Red</title>

<style>

body{
margin:0;
background:#121212;
font-family:Arial;
text-align:center;
color:white;
}

#menu{
position:absolute;
width:100%;
top:40%;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#00ff7f;
cursor:pointer;
}

#game{
width:100%;
height:100vh;
position:relative;
overflow:hidden;
display:none;
}

.block{
width:70px;
height:70px;
position:absolute;
border-radius:12px;
cursor:pointer;
}

.green{background:#00ff7f;}
.red{background:#ff3b3b;}
.coin{background:gold;}

#hud{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

</style>

</head>

<body>

<div id="menu">
<h1>Tap Green – Avoid Red</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game">

<div id="hud">
Score: <span id="score">0</span>
<br>
Coins: <span id="coins">0</span>
<br>
Level: <span id="level">1</span>
</div>

</div>

<script>

let game=document.getElementById("game");

let score=0;
let coins=0;
let level=1;
let speed=1200;

let highScore=localStorage.getItem("highScore") || 0;

let spawner;

function startGame(){

document.getElementById("menu").style.display="none";
game.style.display="block";

startSpawner();

}

function spawnBlock(){

let block=document.createElement("div");

block.classList.add("block");

let r=Math.random();

let type;

if(r<0.6){type="green";}
else if(r<0.85){type="coin";}
else{type="red";}

block.classList.add(type);

let x=Math.random()*(window.innerWidth-80);
let y=Math.random()*(window.innerHeight-200);

block.style.left=x+"px";
block.style.top=y+"px";

game.appendChild(block);

block.onclick=function(){

if(type==="green"){

score++;

}
else if(type==="coin"){

coins++;

}
else{

gameOver();
}

updateHUD();

block.remove();

if(score%10==0){

level++;

speed-=100;

startSpawner();

}

}

setTimeout(()=>block.remove(),speed);

}

function updateHUD(){

document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("level").innerText=level;

if(score>highScore){

highScore=score;

localStorage.setItem("highScore",highScore);

}

}

function startSpawner(){

clearInterval(spawner);

spawner=setInterval(spawnBlock,speed);

}

function gameOver(){

alert("Game Over! Score: "+score);

location.reload();

}

</script>

</body>
         </html>
